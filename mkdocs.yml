site_name: Axied Project
site_description: Википедия сервера Axied — механики, крафты, зачарования и особенности.
site_author: Axied Project
site_url: https://wiki.axied.ru/

docs_dir: docs
not_in_nav: |
  /**
  !/index.md
  !/info/server-info.md
  !/info/currency.md
  !/crafting/miner-potion.md
  !/misc/template-lock.md
  !/misc/item-signing.md
  !/rules/general-rules.md
copyright: '© 2026 Axied Project — Все права защищены. Axied не связан с Mojang AB<br>Создатель: Соковец Григорий Юрьевич'

theme:
  name: material
  language: ru
  custom_dir: overrides
  logo: assets/images/logo.png
  favicon: assets/images/logo.png
  icon:
    repo: fontawesome/brands/github
  font:
    text: Manrope
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tooltips

extra:
  generator: false
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/J5ADg5FeKG
      name: Discord
    - icon: fontawesome/brands/telegram
      link: https://t.me/+tbA1DkmZ77VjZmNi
      name: Telegram
    - icon: fontawesome/solid/cart-shopping
      link: https://shop.axied.ru/
      name: Магазин

extra_css:
  - stylesheets/extra.css?v=20260711l

extra_javascript:
  - javascripts/extra.js?v=20260711l

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
      permalink_title: Ссылка на раздел
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.mark

plugins:
  - search:
      lang:
        - ru
        - en

nav:
  - 🏠 Главная: index.md
  - ℹ️ Информация:
      - 🌳 О сервере: info/server-info.md
      - 🍃 Валюта — Листочки: info/currency.md
  - ⛏️ Зелье шахтёра: crafting/miner-potion.md
  - 🔒 Блокировка шаблонов: misc/template-lock.md
  - 📝 Подписывание предметов: misc/item-signing.md
  - 📜 Правила: rules/general-rules.md
